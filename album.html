<!doctype html>
<html lang="ja" data-root="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="宮本雲平のアルバム．ブラジル，英国，イスラエル，エジプト，ヨルダン，カナダ，スペイン，チリ，ポルトガル，秋田など．">
  <title>アルバム | 宮本 雲平</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=20260614-8">
</head>
<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html">宮本 雲平</a>
      <nav class="nav-links" aria-label="主要ナビゲーション">
        <a href="index.html">ホーム</a>
        <a href="career.html">プロフィール</a>        <a href="research.html">研究</a>
        <a href="education.html">教育</a>
        <a href="links.html">リンク集</a>
        <a href="album.html" aria-current="page">アルバム</a>
        <a href="access.html">アクセス</a>
        <a class="language-link" href="en/album.html">English</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">写真記録</p>
        <h1>アルバム</h1>
        <p>
          海外出張，研究滞在，秋田や国内の風景を，新しい写真から順に並べています．写真はクリックすると大きく表示されます．
        </p>
      </div>
    </section>

    <section class="band paper compact">
      <div class="container">
        <div class="publication-tools">
          <div class="small">写真をクリックすると元画像を開きます．</div>
          <div class="filters" aria-label="アルバムフィルタ">
            <button class="filter-button is-active" data-album-filter="all">すべて</button>
            <button class="filter-button" data-album-filter="overseas">海外</button>
            <button class="filter-button" data-album-filter="akita">秋田</button>
            <button class="filter-button" data-album-filter="japan">国内</button>
          </div>
        </div>
      </div>
    </section>

    <section class="band">
      <div class="container">
        <div class="album-grid" data-album data-filter="all"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong>宮本 雲平</strong>
        <div class="small">更新日: <span data-last-updated></span></div>
      </div>
      <div class="small"><a href="index.html">ホーム</a> / <a href="research.html">研究</a> / <a href="education.html">教育</a></div>
    </div>
  </footer>

  <script src="assets/js/data.js?v=20260614-8"></script>
  <script src="assets/js/site.js?v=20260615-2"></script>  <script>
    (function () {
      function polishAlbum() {
        document.querySelectorAll('.photo-card a[href*="201605.jpg"]').forEach(function (link) {
          const card = link.closest('.photo-card');
          if (card) card.remove();
        });
        document.querySelectorAll('.photo-card figcaption').forEach(function (caption) {
          caption.textContent = caption.textContent.replace('Aomor i', 'Aomori');
        });
      }
      polishAlbum();
      const grid = document.querySelector('[data-album]');
      if (grid) new MutationObserver(polishAlbum).observe(grid, { childList: true, subtree: true });
    }());
  </script>
</body>
</html>
